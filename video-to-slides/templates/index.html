<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频转幻灯片</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; color: #333; }

    .header { background: #1a1a2e; color: white; padding: 20px 40px; }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; color: #aaa; margin-top: 4px; }

    .container { max-width: 960px; margin: 40px auto; padding: 0 20px; }

    .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }

    .upload-area {
      border: 2px dashed #d0d7e3;
      border-radius: 10px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafbff;
    }
    .upload-area:hover, .upload-area.drag-over { border-color: #4f6ef7; background: #f0f4ff; }
    .upload-area .icon { font-size: 48px; margin-bottom: 12px; }
    .upload-area h3 { font-size: 18px; color: #333; margin-bottom: 8px; }
    .upload-area p { color: #888; font-size: 14px; }
    #fileInput { display: none; }

    .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    .setting-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .setting-group input[type=range] { width: 100%; accent-color: #4f6ef7; }
    .setting-group .hint { font-size: 12px; color: #999; margin-top: 4px; }
    .threshold-val { font-weight: 600; color: #4f6ef7; }

    .format-btns { display: flex; gap: 10px; }
    .format-btn {
      flex: 1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;
      background: white; cursor: pointer; text-align: center; font-size: 14px; transition: all 0.15s;
    }
    .format-btn.active { border-color: #4f6ef7; background: #f0f4ff; color: #4f6ef7; font-weight: 600; }

    .btn {
      display: inline-block; padding: 12px 28px; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: #4f6ef7; color: white; width: 100%; margin-top: 20px; }
    .btn-primary:hover { background: #3a5be0; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

    .progress-wrap { display: none; margin-top: 20px; }
    .progress-bar { height: 6px; background: #e8eaed; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4f6ef7, #7c9aff); width: 0; transition: width 0.3s; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    .progress-text { text-align: center; font-size: 13px; color: #666; margin-top: 8px; }

    .results { display: none; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .results-header h2 { font-size: 18px; }
    .badge { background: #4f6ef7; color: white; padding: 3px 10px; border-radius: 20px; font-size: 13px; }

    .download-btns { display: flex; gap: 10px; }
    .btn-download { padding: 8px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; border: 2px solid; cursor: pointer; }
    .btn-zip { border-color: #4f6ef7; color: #4f6ef7; background: white; }
    .btn-zip:hover { background: #f0f4ff; }
    .btn-pdf { border-color: #e67e22; color: #e67e22; background: white; }
    .btn-pdf:hover { background: #fef5ec; }

    .slides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .slide-item { border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #f5f5f5; }
    .slide-item img { width: 100%; display: block; }
    .slide-label { padding: 8px 12px; font-size: 12px; color: #888; }

    .error-msg { display: none; background: #fff0f0; border: 1px solid #fcc; border-radius: 8px; padding: 14px 16px; color: #c00; font-size: 14px; margin-top: 16px; }

    @media (max-width: 600px) {
      .settings { grid-template-columns: 1fr; }
      .slides-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>视频转幻灯片</h1>
    <p>上传包含PPT的录屏视频，自动提取每一页幻灯片</p>
  </div>

  <div class="container">
    <div class="card">
      <div class="upload-area" id="uploadArea">
        <div class="icon">🎬</div>
        <h3>点击上传或拖拽视频文件</h3>
        <p>支持 MP4、MOV、AVI、MKV 等格式，最大 500MB</p>
        <input type="file" id="fileInput" accept="video/*">
      </div>

      <div id="fileInfo" style="display:none; margin-top:12px; padding:10px 14px; background:#f0f4ff; border-radius:8px; font-size:14px; color:#4f6ef7;"></div>

      <div class="settings">
        <div class="setting-group">
          <label>检测灵敏度：<span class="threshold-val" id="thresholdVal">中等</span></label>
          <input type="range" id="threshold" min="1" max="3" step="1" value="2">
          <div class="hint">灵敏度越高，提取的幻灯片越多（包含动画步骤）</div>
        </div>
        <div class="setting-group">
          <label>导出格式</label>
          <div class="format-btns">
            <button class="format-btn active" data-fmt="zip">PNG 图片包</button>
            <button class="format-btn" data-fmt="pdf">PDF 合并</button>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="extractBtn" disabled>开始提取</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">正在分析视频，请稍候...</div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="card results" id="results">
      <div class="results-header">
        <h2>提取结果 <span class="badge" id="slideCount">0 页</span></h2>
        <div class="download-btns">
          <button class="btn-download btn-zip" id="downloadZip">下载 PNG 包</button>
          <button class="btn-download btn-pdf" id="downloadPdf">下载 PDF</button>
        </div>
      </div>
      <div class="slides-grid" id="slidesGrid"></div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const extractBtn = document.getElementById('extractBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const results = document.getElementById('results');
    const slidesGrid = document.getElementById('slidesGrid');
    const errorMsg = document.getElementById('errorMsg');
    const fileInfo = document.getElementById('fileInfo');
    const thresholdInput = document.getElementById('threshold');
    const thresholdVal = document.getElementById('thresholdVal');

    let selectedFile = null;
    let selectedFormat = 'zip';
    let currentSessionId = null;

    const thresholdLabels = { 1: '低（跳过动画步骤）', 2: '中等', 3: '高（包含动画步骤）' };
    const thresholdValues = { 1: 0.85, 2: 0.92, 3: 0.97 };

    thresholdInput.addEventListener('input', () => {
      thresholdVal.textContent = thresholdLabels[thresholdInput.value];
    });

    document.querySelectorAll('.format-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFormat = btn.dataset.fmt;
      });
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(file) {
      selectedFile = file;
      const mb = (file.size / 1024 / 1024).toFixed(1);
      fileInfo.textContent = `已选择：${file.name}（${mb} MB）`;
      fileInfo.style.display = 'block';
      extractBtn.disabled = false;
    }

    function setProgress(pct, text) {
      progressFill.style.width = pct + '%';
      if (text) progressText.textContent = text;
    }

    extractBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      errorMsg.style.display = 'none';
      results.style.display = 'none';
      progressWrap.style.display = 'block';
      extractBtn.disabled = true;
      setProgress(15, '正在上传视频...');

      const formData = new FormData();
      formData.append('video', selectedFile);
      formData.append('threshold', thresholdValues[thresholdInput.value]);

      // Animate progress while waiting
      let pct = 20;
      const timer = setInterval(() => {
        pct = Math.min(pct + 2, 85);
        setProgress(pct, '正在分析视频，检测幻灯片切换...');
      }, 800);

      try {
        const res = await fetch('/preview', { method: 'POST', body: formData });
        clearInterval(timer);

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '服务器错误');
        }

        const data = await res.json();
        setProgress(100, `完成！共检测到 ${data.count} 页幻灯片`);
        currentSessionId = data.session_id;

        document.getElementById('slideCount').textContent = `${data.count} 页`;
        slidesGrid.innerHTML = '';
        data.thumbnails.forEach((url, i) => {
          const div = document.createElement('div');
          div.className = 'slide-item';
          div.innerHTML = `<img src="${url}" loading="lazy"><div class="slide-label">第 ${i+1} 页</div>`;
          slidesGrid.appendChild(div);
        });

        results.style.display = 'block';
        setTimeout(() => { progressWrap.style.display = 'none'; }, 1000);

      } catch(e) {
        clearInterval(timer);
        progressWrap.style.display = 'none';
        errorMsg.textContent = '错误：' + e.message;
        errorMsg.style.display = 'block';
      } finally {
        extractBtn.disabled = false;
      }
    });

    document.getElementById('downloadZip').addEventListener('click', () => {
      if (currentSessionId) window.location = `/download/${currentSessionId}/zip`;
    });
    document.getElementById('downloadPdf').addEventListener('click', () => {
      if (currentSessionId) window.location = `/download/${currentSessionId}/pdf`;
    });
  </script>
</body>
</html>
